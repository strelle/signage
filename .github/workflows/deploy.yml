name: deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'

jobs:
  deploy-nas:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Add NAS to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy via SSH/Compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd "$DEPLOY_PATH/compose" && sudo -n /usr/local/bin/docker compose pull && sudo -n /usr/local/bin/docker compose up -d --build && sudo -n /usr/local/bin/docker compose ps'
